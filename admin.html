<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — DealFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    body { min-height: 100vh; background: var(--bg); padding: 2rem; }

    .admin-header {
      max-width: 900px; margin: 0 auto 2.5rem;
      display: flex; align-items: center; justify-content: space-between;
    }
    .admin-header__logo { font-family: var(--font-serif); font-size: 1.1rem; color: var(--text); text-decoration: none; }
    .admin-header__logo span { color: var(--accent); }
    .admin-wrap { max-width: 900px; margin: 0 auto; }

    .section-block { margin-bottom: 3rem; }
    .section-block__title { font-family: var(--font-sans); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--text-muted); margin-bottom: 1rem; }

    /* Request card */
    .req-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.5rem;
      margin-bottom: 0.75rem; transition: border-color 0.2s;
    }
    .req-card__top { display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
    .req-card__name { font-size: 1rem; font-weight: 500; color: var(--text); margin-bottom: 2px; }
    .req-card__email { font-size: 12px; color: var(--text-muted); }
    .req-card__desc { font-size: 13px; color: var(--text-muted); margin-top: 0.75rem; line-height: 1.5; }
    .req-card__actions { display: flex; gap: 0.5rem; flex-shrink: 0; }

    .btn--approve {
      font-family: var(--font-sans); font-size: 12px; padding: 6px 14px;
      border-radius: var(--radius-pill); border: 0.5px solid rgba(180,255,106,0.4);
      background: rgba(180,255,106,0.1); color: var(--accent);
      cursor: pointer; transition: all 0.15s;
    }
    .btn--approve:hover { background: rgba(180,255,106,0.2); }

    .btn--deny {
      font-family: var(--font-sans); font-size: 12px; padding: 6px 14px;
      border-radius: var(--radius-pill); border: 0.5px solid rgba(255,80,80,0.3);
      background: transparent; color: rgba(255,100,100,0.8);
      cursor: pointer; transition: all 0.15s;
    }
    .btn--deny:hover { background: rgba(255,80,80,0.1); }

    /* Slug edit row */
    .slug-row {
      display: flex; align-items: center; gap: 0.5rem;
      margin-top: 1rem; padding-top: 1rem;
      border-top: 1px solid var(--border);
    }
    .slug-row label { font-size: 12px; color: var(--text-muted); white-space: nowrap; }
    .slug-row input {
      flex: 1; background: var(--bg-card-2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 7px 10px;
      color: var(--text); font-family: monospace; font-size: 13px; outline: none;
      transition: border-color 0.2s;
    }
    .slug-row input:focus { border-color: rgba(180,255,106,0.4); }

    /* Group card */
    .group-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 1.5rem;
      margin-bottom: 0.75rem;
    }
    .group-card__top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
    .group-card__name { font-size: 1rem; font-weight: 500; color: var(--text); }
    .group-card__meta { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
    .group-card__link-row {
      display: flex; align-items: center; gap: 0.75rem;
      background: var(--bg-card-2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 14px;
    }
    .group-card__link-row span {
      font-size: 13px; color: var(--blue); flex: 1;
      overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: monospace;
    }
    .copy-btn {
      font-family: var(--font-sans); font-size: 12px; padding: 5px 12px;
      border-radius: var(--radius-pill); border: 0.5px solid var(--border);
      background: transparent; color: var(--text-muted);
      cursor: pointer; transition: all 0.15s; white-space: nowrap; flex-shrink: 0;
    }
    .copy-btn:hover, .copy-btn.copied { border-color: var(--accent); color: var(--accent); }

    .empty-state { text-align: center; padding: 2.5rem; color: var(--text-dim); font-size: 13px;
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); }

    /* Login */
    .login-overlay {
      position: fixed; inset: 0; background: var(--bg);
      display: flex; align-items: center; justify-content: center; z-index: 1000;
    }
    .login-card {
      background: var(--bg-card); border: 1px solid var(--border);
      border-radius: var(--radius-lg); padding: 2.5rem;
      width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 1rem;
    }
    .login-card__logo { font-family: var(--font-serif); font-size: 1.25rem; color: var(--text); }
    .login-card__logo span { color: var(--accent); }
    .login-card h2 { font-family: var(--font-serif); font-size: 1.5rem; color: var(--text); margin: 0; }
    .login-card p { color: var(--text-muted); font-size: 0.9rem; margin: 0; }
    .login-card .form-group { display: flex; flex-direction: column; gap: 0.4rem; }
    .login-card label { font-size: 13px; color: var(--text-muted); }
    .login-card input {
      background: var(--bg-card-2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 12px;
      color: var(--text); font-family: var(--font-sans); font-size: 14px;
      outline: none; transition: border-color 0.2s;
    }
    .login-card input:focus { border-color: rgba(180,255,106,0.4); }
  </style>
</head>
<body>

  <!-- LOGIN OVERLAY -->
  <div class="login-overlay" id="loginOverlay">
    <div class="login-card">
      <div class="login-card__logo">deal<span>flow</span></div>
      <h2>Admin access</h2>
      <p>Sign in to manage your groups.</p>
      <div class="form-group">
        <label for="loginEmail">Email</label>
        <input type="email" id="loginEmail" placeholder="you@email.com" />
      </div>
      <div class="form-group">
        <label for="loginPassword">Password</label>
        <input type="password" id="loginPassword" placeholder="••••••••" onkeydown="if(event.key==='Enter')handleLogin()" />
      </div>
      <div id="loginError" style="display:none;color:rgba(255,80,80,0.8);font-size:13px;margin-bottom:0.5rem"></div>
      <button class="btn btn--primary" style="width:100%" onclick="handleLogin()">Sign in →</button>
    </div>
  </div>

  <!-- CONTENT -->
  <div class="admin-header">
    <a href="index.html" class="admin-header__logo">deal<span>flow</span></a>
    <a href="dashboard.html" class="btn btn--ghost" style="font-size:13px;padding:7px 16px">← Dashboard</a>
  </div>

  <div class="admin-wrap">

    <div class="section-block">
      <div class="section-block__title">Pending requests</div>
      <div id="requestsList"><div class="empty-state">Loading...</div></div>
    </div>

    <div class="section-block">
      <div class="section-block__title">Active groups</div>
      <div id="groupsList"><div class="empty-state">Loading...</div></div>
    </div>

  </div>

  <script>
    const BASE_URL = 'https://getdealflow-app.vercel.app';
    const ADMIN_EMAIL = 'laurenragee2006@gmail.com';
    async function sendApprovalEmail(toEmail, name, applyLink, dashLink, tempPass) {
      try {
        const res = await fetch('/api/send-email', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ to: toEmail, name, applyLink, dashLink, tempPass })
        });
        return res.ok;
      } catch(e) { return false; }
    }

    const db = window.supabase.createClient(
      'https://fqqyguufldcvckyaqzxw.supabase.co',
      'sb_publishable_8LxqtjUExBClidRzt4tH1Q_GIqttXmr'
    );

    db.auth.onAuthStateChange((event, session) => {
      if (session) {
        if (session.user.email !== ADMIN_EMAIL) {
          document.getElementById('requestsList').innerHTML = '<div class="empty-state">Access denied.</div>';
          document.getElementById('groupsList').innerHTML = '';
          document.getElementById('loginOverlay').style.display = 'none';
          return;
        }
        document.getElementById('loginOverlay').style.display = 'none';
        setTimeout(() => { loadRequests(); loadGroups(); }, 500);
      } else {
        document.getElementById('loginOverlay').style.display = 'flex';
      }
    });

    async function handleLogin() {
      const email = document.getElementById('loginEmail').value.trim();
      const password = document.getElementById('loginPassword').value;
      const errEl = document.getElementById('loginError');
      const btn = document.querySelector('.login-card .btn--primary');
      if (!email || !password) return;
      errEl.style.display = 'none';
      btn.textContent = 'Signing in...';
      btn.disabled = true;
      const { error } = await db.auth.signInWithPassword({ email, password });
      if (error) {
        errEl.textContent = 'Invalid email or password.';
        errEl.style.display = 'block';
        btn.textContent = 'Sign in →';
        btn.disabled = false;
      }
    }

    // --- REQUESTS ---

    async function loadRequests() {
      const { data } = await db.from('group_requests')
        .select('*')
        .eq('status', 'pending')
        .order('created_at', { ascending: false });

      const el = document.getElementById('requestsList');

      if (!data || data.length === 0) {
        el.innerHTML = '<div class="empty-state">No pending requests.</div>';
        return;
      }

      el.innerHTML = data.map(r => `
        <div class="req-card" id="req-${r.id}"
          data-id="${r.id}"
          data-name="${encodeURIComponent(r.fund_name)}"
          data-email="${encodeURIComponent(r.contact_email)}"
          data-desc="${encodeURIComponent(r.description||'')}">
          <div class="req-card__top">
            <div>
              <div class="req-card__name">${r.fund_name}</div>
              <div class="req-card__email">${r.contact_email}</div>
            </div>
            <div class="req-card__actions">
              <button type="button" class="btn--approve" onclick="openApprove('${r.id}')">Approve</button>
              <button type="button" class="btn--deny" onclick="denyRequest('${r.id}')">Deny</button>
            </div>
          </div>
          ${r.description ? `<div class="req-card__desc">${r.description}</div>` : ''}
          <div id="approve-panel-${r.id}" style="display:none">
            <div class="slug-row">
              <label>URL slug:</label>
              <input type="text" id="slug-${r.id}" value="${toSlug(r.fund_name)}" placeholder="e.g. horizon-ventures" />
              <button type="button" class="btn--approve" onclick="confirmApproveFromCard('${r.id}')">Confirm →</button>
            </div>
          </div>
        </div>
      `).join('');
    }

    function toSlug(name) {
      return name.toLowerCase().trim().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
    }

    function openApprove(id) {
      const panel = document.getElementById(`approve-panel-${id}`);
      panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
    }

    function makeTempPassword() {
      const chars = 'abcdefghjkmnpqrstuvwxyz23456789';
      let pass = '';
      for (let i = 0; i < 8; i++) pass += chars[Math.floor(Math.random() * chars.length)];
      return pass + 'A1!';
    }

    function confirmApproveFromCard(id) {
      const card = document.getElementById(`req-${id}`);
      const name = decodeURIComponent(card.dataset.name);
      const email = decodeURIComponent(card.dataset.email);
      const description = decodeURIComponent(card.dataset.desc);
      confirmApprove(id, name, email, description);
    }

    async function confirmApprove(id, name, email, description) {
      const slug = document.getElementById(`slug-${id}`).value.trim();
      if (!slug) { alert('Please enter a slug.'); return; }

      const confirmBtn = document.querySelector(`#approve-panel-${id} .btn--approve`);
      confirmBtn.textContent = 'Approving...';
      confirmBtn.disabled = true;

      // Generate a temp password and create their dashboard account
      const tempPass = makeTempPassword();
      const tempClient = window.supabase.createClient(
        'https://fqqyguufldcvckyaqzxw.supabase.co',
        'sb_publishable_8LxqtjUExBClidRzt4tH1Q_GIqttXmr'
      );
      await tempClient.auth.signUp({ email, password: tempPass });

      // Create the group
      const { error: groupError } = await db.from('groups').insert({
        name, slug, owner_email: email, description: description || ''
      });

      if (groupError) {
        alert('Error creating group: ' + groupError.message);
        confirmBtn.textContent = 'Confirm →';
        confirmBtn.disabled = false;
        return;
      }

      // Mark request as approved
      await db.from('group_requests').update({ status: 'approved' }).eq('id', id);

      const applyLink = `${BASE_URL}/apply.html?g=${slug}`;
      const dashLink = `${BASE_URL}/dashboard.html`;

      const emailBody = encodeURIComponent(
`Hi ${name} team,

Your DealFlow group has been approved! Here's everything you need:

📋 Application form (share this link with founders):
${applyLink}

📊 Investor dashboard (your private review portal):
${dashLink}

🔐 Login credentials:
Email: ${email}
Temporary password: ${tempPass}

Sign in at the dashboard link above and change your password after first login.

Let us know if you have any questions!

— The DealFlow Team`
      );

      const mailtoLink = `mailto:${email}?subject=Your DealFlow group is live!&body=${emailBody}`;

      document.getElementById(`req-${id}`).innerHTML = `
        <div style="padding:0.5rem 0">
          <div style="font-size:13px;color:var(--accent);margin-bottom:1rem">✓ ${name} approved</div>

          <div style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.4rem">Apply link</div>
          <div class="group-card__link-row" style="margin-bottom:0.75rem">
            <span>${applyLink}</span>
            <button class="copy-btn" onclick="copyText('${applyLink}', this)">Copy</button>
          </div>

          <div style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.4rem">Dashboard link</div>
          <div class="group-card__link-row" style="margin-bottom:0.75rem">
            <span>${dashLink}</span>
            <button class="copy-btn" onclick="copyText('${dashLink}', this)">Copy</button>
          </div>

          <div style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.4rem">Temp password</div>
          <div class="group-card__link-row" style="margin-bottom:1rem">
            <span style="font-family:monospace">${tempPass}</span>
            <button class="copy-btn" onclick="copyText('${tempPass}', this)">Copy</button>
          </div>

          <button class="btn--approve" style="padding:8px 18px" id="emailBtn-${id}" onclick="sendEmailBtn('${id}','${email}','${name}','${applyLink}','${dashLink}','${tempPass}')">✉ Send approval email</button>
        </div>
      `;

      loadGroups();
    }

    async function sendEmailBtn(id, email, name, applyLink, dashLink, tempPass) {
      const btn = document.getElementById(`emailBtn-${id}`);
      btn.textContent = 'Sending...';
      btn.disabled = true;
      const ok = await sendApprovalEmail(email, name, applyLink, dashLink, tempPass);
      btn.textContent = ok ? '✓ Email sent' : '✕ Failed — check console';
      btn.disabled = false;
    }

    async function denyRequest(id) {
      if (!confirm('Deny this request?')) return;
      await db.from('group_requests').update({ status: 'denied' }).eq('id', id);
      document.getElementById(`req-${id}`).style.opacity = '0.4';
      document.getElementById(`req-${id}`).style.pointerEvents = 'none';
      setTimeout(() => { document.getElementById(`req-${id}`).remove(); loadRequests(); }, 600);
    }

    // --- GROUPS ---

    async function loadGroups() {
      const { data } = await db.from('groups').select('*').order('created_at', { ascending: false });
      const el = document.getElementById('groupsList');

      if (!data || data.length === 0) {
        el.innerHTML = '<div class="empty-state">No active groups yet.</div>';
        return;
      }

      el.innerHTML = data.map(g => `
        <div class="group-card">
          <div class="group-card__top">
            <div>
              <div class="group-card__name">${g.name}</div>
              <div class="group-card__meta">${g.owner_email} · slug: ${g.slug}</div>
            </div>
          </div>
          <div style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.4rem">Apply link</div>
          <div class="group-card__link-row" style="margin-bottom:0.75rem">
            <span>${BASE_URL}/apply.html?g=${g.slug}</span>
            <button class="copy-btn" onclick="copyText('${BASE_URL}/apply.html?g=${g.slug}', this)">Copy</button>
          </div>
          <div style="font-size:11px;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:0.4rem">Dashboard link</div>
          <div class="group-card__link-row" style="margin-bottom:0.75rem">
            <span>${BASE_URL}/dashboard.html</span>
            <button class="copy-btn" onclick="copyText('${BASE_URL}/dashboard.html', this)">Copy</button>
          </div>
          <button class="copy-btn" onclick="copyText(\`update auth.users set encrypted_password = crypt('Temp1234!', gen_salt('bf')) where email = '${g.owner_email}';\`, this)" style="font-size:12px;padding:6px 14px">↺ Copy password reset SQL</button>
        </div>
      `).join('');
    }

    function copyText(text, btn) {
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'Copied ✓';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = btn.textContent.includes('apply') ? 'Copy apply link' : 'Copy link'; btn.classList.remove('copied'); }, 2000);
      });
    }
  </script>
</body>
</html>
