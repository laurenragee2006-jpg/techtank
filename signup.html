<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Get Early Access — DealFlow</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <style>
    body { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }

    .signup-wrap { width: 100%; max-width: 520px; }

    .signup-back { display: inline-block; color: var(--text-muted); font-size: 13px; margin-bottom: 2rem; text-decoration: none; }
    .signup-back:hover { color: var(--text); }

    .signup-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-lg); padding: 2.5rem; }

    .signup-card__label { font-size: 12px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--accent); margin-bottom: 0.75rem; }
    .signup-card h1 { font-family: var(--font-serif); font-size: 2rem; color: var(--text); margin-bottom: 0.5rem; }
    .signup-card__sub { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 2rem; line-height: 1.6; }

    .form-group { display: flex; flex-direction: column; gap: 0.4rem; margin-bottom: 1.25rem; }
    label { font-size: 13px; color: var(--text-muted); }
    input, textarea, select {
      background: var(--bg-card-2); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 10px 12px;
      color: var(--text); font-family: var(--font-sans); font-size: 14px;
      outline: none; transition: border-color 0.2s; width: 100%;
    }
    input:focus, textarea:focus, select:focus { border-color: rgba(180,255,106,0.4); }
    textarea { resize: vertical; min-height: 90px; }

    .signup-actions { margin-top: 1.75rem; }

    .signup-success { text-align: center; padding: 1rem 0; }
    .signup-success h2 { font-family: var(--font-serif); font-size: 1.75rem; color: var(--text); margin: 1rem 0 0.5rem; }
    .signup-success p { color: var(--text-muted); line-height: 1.6; }
    .success-icon { width: 52px; height: 52px; border-radius: 50%; background: var(--accent-dim); display: flex; align-items: center; justify-content: center; margin: 0 auto; }
  </style>
</head>
<body>

  <div class="signup-wrap">
    <a href="index.html" class="signup-back">← Back to home</a>

    <div class="signup-card" id="signupCard">
      <p class="signup-card__label">Early access</p>
      <h1>Request access to DealFlow</h1>
      <p class="signup-card__sub">Tell us about your group. We'll set up your pipeline and send you your apply link within 24 hours.</p>

      <form id="signupForm" novalidate>
        <div class="form-group">
          <label for="fundName">Fund / group name <span class="required">*</span></label>
          <input type="text" id="fundName" placeholder="Horizon Ventures" required />
        </div>
        <div class="form-group">
          <label for="contactEmail">Your email <span class="required">*</span></label>
          <input type="email" id="contactEmail" placeholder="you@fund.com" required />
        </div>
        <div class="form-group">
          <label for="fundDesc">What do you invest in?</label>
          <textarea id="fundDesc" placeholder="e.g. Early-stage B2B SaaS, climate tech, fintech..."></textarea>
        </div>

        <div id="signupError" style="display:none;color:rgba(255,80,80,0.8);font-size:13px;margin-bottom:1rem"></div>

        <div class="signup-actions">
          <button type="submit" class="btn btn--primary" style="width:100%">Request access →</button>
        </div>
      </form>
    </div>
  </div>

  <script>
    const db = window.supabase.createClient(
      'https://fqqyguufldcvckyaqzxw.supabase.co',
      'sb_publishable_8LxqtjUExBClidRzt4tH1Q_GIqttXmr'
    );

    document.getElementById('signupForm').addEventListener('submit', async e => {
      e.preventDefault();
      const fundName = document.getElementById('fundName').value.trim();
      const contactEmail = document.getElementById('contactEmail').value.trim();
      const fundDesc = document.getElementById('fundDesc').value.trim();
      const errEl = document.getElementById('signupError');
      const btn = document.querySelector('[type="submit"]');

      if (!fundName || !contactEmail) {
        errEl.textContent = 'Please fill in your fund name and email.';
        errEl.style.display = 'block';
        return;
      }

      btn.textContent = 'Submitting...';
      btn.disabled = true;
      errEl.style.display = 'none';

      const { error } = await db.from('group_requests').insert({
        fund_name: fundName,
        contact_email: contactEmail,
        description: fundDesc,
      });

      if (error) {
        errEl.textContent = 'Something went wrong. Please try again.';
        errEl.style.display = 'block';
        btn.textContent = 'Request access →';
        btn.disabled = false;
        return;
      }

      document.getElementById('signupCard').innerHTML = `
        <div class="signup-success">
          <div class="success-icon">
            <svg width="24" height="24" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="15" stroke="#B4FF6A" stroke-width="1.5"/><path d="M10 16l4 4 8-8" stroke="#B4FF6A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </div>
          <h2>You're on the list</h2>
          <p>We'll set up your pipeline and email your apply link to <strong style="color:var(--text)">${contactEmail}</strong> within 24 hours.</p>
          <a href="index.html" class="btn btn--ghost" style="margin-top:1.5rem;display:inline-block">← Back to home</a>
        </div>
      `;
    });
  </script>
</body>
</html>
